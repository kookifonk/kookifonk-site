<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KookifonK · Commander</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=IBM+Plex+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--rust:#B85835;--dark:#1A1400;--bg:#F9F3EE;--white:#fff;--border:#E8DDD5;--muted:#888;--green:#2D7A52}
body{font-family:'IBM Plex Mono',monospace;background:var(--bg);color:var(--dark);min-height:100vh}
header{background:var(--dark);height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 20px}
.logo{font-family:'Playfair Display',serif;font-size:20px;font-weight:900;color:var(--bg);text-decoration:none}
.back{font-size:10px;color:rgba(255,255,255,.5);text-decoration:none;font-weight:700;letter-spacing:.08em;text-transform:uppercase}
.back:hover{color:#fff}
.wrap{max-width:1100px;margin:0 auto;padding:28px 16px;display:grid;grid-template-columns:1fr 360px;gap:28px}
h2{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.section{margin-bottom:28px}
.section-title{font-size:8px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--rust);margin-bottom:10px}
.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:10px}
.product-card{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:13px;transition:all .15s;position:relative}
.product-card:hover{border-color:var(--rust);box-shadow:0 2px 12px rgba(184,88,53,.12)}
.product-card.in-cart{border-color:var(--rust);background:#FDF7F4}
.pc-emoji{font-size:20px;margin-bottom:5px}
.pc-name{font-size:10px;font-weight:700;line-height:1.3;margin-bottom:2px}
.pc-choco{font-size:8px;color:var(--muted);margin-bottom:2px;font-style:italic}
.pc-moment{font-size:8px;color:var(--rust);margin-bottom:6px;line-height:1.3}
.pc-price{font-size:14px;font-weight:700;color:var(--rust);font-family:'Playfair Display',serif}
.pc-qty{position:absolute;top:8px;right:8px;background:var(--rust);color:#fff;border-radius:50%;width:20px;height:20px;display:none;align-items:center;justify-content:center;font-size:10px;font-weight:700}
.product-card.in-cart .pc-qty{display:flex}
.pc-btns{display:flex;align-items:center;gap:6px;margin-top:8px}
.pc-btn{background:transparent;border:1px solid var(--border);border-radius:3px;width:24px;height:24px;cursor:pointer;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;color:var(--dark)}
.pc-btn:hover{border-color:var(--rust);color:var(--rust)}
.pc-qty-disp{font-size:12px;font-weight:700;min-width:16px;text-align:center}
.pack-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.pack-card{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:14px;cursor:pointer;transition:all .15s}
.pack-card:hover{border-color:var(--rust);box-shadow:0 2px 12px rgba(184,88,53,.12)}
.pack-card.in-cart{border-color:var(--rust);background:#FDF7F4}
.pack-card.sensoria{border-color:rgba(155,74,107,.35)}
.pack-card.sensoria:hover{border-color:rgb(155,74,107)}
.pack-badge{display:inline-block;font-size:8px;background:var(--rust);color:#fff;padding:2px 7px;border-radius:20px;font-weight:700;letter-spacing:.06em;margin-bottom:6px}
.pack-badge.rose{background:rgb(155,74,107)}
.pack-name{font-size:12px;font-weight:700;margin-bottom:3px}
.pack-desc{font-size:9px;color:var(--muted);margin-bottom:8px;line-height:1.4}
.pack-price{font-size:16px;font-weight:900;color:var(--rust);font-family:'Playfair Display',serif}
.pack-save{font-size:9px;color:var(--green);margin-left:6px;font-weight:700}
.cart-panel{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:20px;position:sticky;top:20px;max-height:calc(100vh - 40px);overflow-y:auto}
.cart-empty{text-align:center;padding:28px 0;color:#ccc;font-size:12px}
.cart-items{margin-bottom:14px}
.cart-item{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.cart-item:last-child{border-bottom:none}
.ci-price{font-size:12px;font-weight:700;color:var(--rust);white-space:nowrap}
.ci-rm{background:none;border:none;color:#ccc;cursor:pointer;font-size:14px;padding:0 2px}
.ci-rm:hover{color:#c0392b}
.cart-sep{border:none;border-top:1px solid var(--border);margin:10px 0}
.cart-row{display:flex;justify-content:space-between;font-size:11px;margin-bottom:5px}
.cart-row.total{font-size:14px;font-weight:700;margin-top:6px}
.cart-row.total span:last-child{color:var(--rust);font-family:'Playfair Display',serif;font-size:18px}
.checkout-btn{width:100%;background:var(--rust);color:#fff;border:none;border-radius:6px;padding:14px;font-size:13px;font-family:'IBM Plex Mono',monospace;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;transition:background .15s;margin-top:12px}
.checkout-btn:hover{background:#9c4a28}
.checkout-btn:disabled{opacity:.5;cursor:not-allowed}
.security{text-align:center;margin-top:8px;font-size:9px;color:#bbb}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--dark);color:#fff;padding:10px 20px;border-radius:6px;font-size:11px;font-weight:700;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999}
.toast.show{opacity:1}
@media(max-width:740px){.wrap{grid-template-columns:1fr}.cart-panel{position:static}.product-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>

<header>
  <a href="/" class="logo">KookifonK</a>
  <a href="/produits.html" class="back">← Produits</a>
</header>

<div class="wrap">
  <div>
    <h2>Choisissez vos snacks</h2>

    <!-- À L'UNITÉ -->
    <div class="section">
      <div class="section-title">À l'unité — 4,90 €</div>
      <div class="product-grid" id="grid-unite"></div>
    </div>

    <!-- PACK 4 -->
    <div class="section">
      <div class="section-title">Pack 4 snacks identiques — 18,00 €</div>
      <div class="product-grid" id="grid-pack4"></div>
    </div>

    <!-- PACKS -->
    <div class="section">
      <div class="section-title">Packs — meilleur prix</div>
      <div class="pack-grid" id="grid-packs"></div>
    </div>
  </div>

  <div>
    <div class="cart-panel">
      <h2>Mon panier <span id="cart-count" style="color:var(--rust)"></span></h2>
      <div id="cart-empty" class="cart-empty">Votre panier est vide.<br>Ajoutez vos snacks ci-contre.</div>
      <div id="cart-items" class="cart-items" style="display:none"></div>
      <div id="cart-totals" style="display:none">
        <hr class="cart-sep">
        <div class="cart-row"><span>Sous-total</span><span id="subtotal">0,00 €</span></div>
        <hr class="cart-sep">
        <div class="cart-row total"><span>Total</span><span id="cart-total">0,00 €</span></div>
        <button class="checkout-btn" id="checkout-btn" onclick="goCheckout()">🔒 Payer avec Stripe</button>
        <div class="security">Paiement 100% sécurisé · Stripe</div>
        <div class="security" style="margin-top:4px">🎟️ Codes promo acceptés sur la page de paiement</div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── PRODUITS ──
var PRODUITS = [
  {
    id:"energie",
    nom:"Énergie Morning",
    emoji:"☀️",
    choco:"Valrhona Noir 70%",
    moment:"Avant ce qui compte ce matin"
  },
  {
    id:"focus",
    nom:"Focus Deep Work",
    emoji:"🎯",
    choco:"Valrhona Framboise",
    moment:"20 min avant de travailler"
  },
  {
    id:"alpes",
    nom:"Alpes Endurance",
    emoji:"🏔️",
    choco:"Valrhona Blanc",
    moment:"Avant trail · vélo · rando"
  },
  {
    id:"recup",
    nom:"Récup Night",
    emoji:"🌙",
    choco:"Valrhona Lait",
    moment:"Le soir après l'effort"
  },
  {
    id:"deepsleep",
    nom:"Deep Sleep",
    emoji:"💤",
    choco:"Valrhona Blanc",
    moment:"15 min avant de dormir"
  },
  {
    id:"sensoria",
    nom:"Sensoria",
    emoji:"🌸",
    choco:"Valrhona Framboise",
    moment:"Les 7 jours avant"
  }
];

// ── PRICE IDs STRIPE ──
var FORMATS = {
  unite: {
    label:"x1",
    prix:4.90,
    priceIds:{
      energie:   "price_1T8TEIHDPI45iJSiaNXC37zI",
      focus:     "price_1T8StWHDPI45iJSiEXowq1Yw",
      alpes:     "price_1T8THqHDPI45iJSiZ6aZnXaK",
      recup:     "price_1T8TSCHDPI45iJSijo99ymwP",
      deepsleep: "price_1TJCAfHDPI45iJSiAxLS3BAB",
      sensoria:  "price_1TJCCGHDPi45iJSiYwb5eRLe"
    }
  },
  pack4: {
    label:"x4",
    prix:18.00,
    priceIds:{
      energie:   "price_1TJCMRHDPi45iJSiPgUVxUTX",
      focus:     "price_1TJCOSHDPi45iJSiYGqUdR5l",
      alpes:     "price_1TJCQ3HDPi45iJSiI2DKTMuU",
      recup:     "price_1TJCTfHDPi45iJSiUTPa2JHP",
      deepsleep: "price_1TJCUqHDPi45iJSiLFOT1vsq",
      sensoria:  "price_1TJCVwHDPi45iJSiWzisxbtG"
    }
  }
};

// ── PACKS ──
var PACKS = [
  {
    id:"trail",
    nom:"Pack Protocole Trail",
    emoji:"🏔️",
    badge:"PROTOCOLE",
    badgeClass:"",
    cardClass:"",
    desc:"8 biscuits Alpes Endurance · 3 semaines de préparation + jour J",
    prix:32.00,
    priceId:"price_1TJCEYHDPi45iJSiL2OTRZY6"
  },
  {
    id:"recup",
    nom:"Pack Protocole Récup",
    emoji:"🌙",
    badge:"PROTOCOLE",
    badgeClass:"",
    cardClass:"",
    desc:"12 biscuits Récup Night · 3 semaines de récupération sportive",
    prix:46.00,
    priceId:"price_1TJCGYHDPi45iJSip7n0aUpB"
  },
  {
    id:"cycle",
    nom:"Pack Protocole Cycle",
    emoji:"🌸",
    badge:"PROTOCOLE",
    badgeClass:"rose",
    cardClass:"sensoria",
    desc:"14 biscuits Sensoria · 2 cycles complets · Effet documenté",
    prix:52.00,
    priceId:"price_1TJCJTHDPi45iJSivDwvHLGF"
  }
];

// ── PANIER ──
var cart = [];

function cartKey(id, f) { return id + "_" + f; }
function fmt(n) { return n.toFixed(2).replace(".", ",") + " €"; }

function addToCart(prodId, format) {
  var f = FORMATS[format];
  var priceId = f.priceIds[prodId];
  if (priceId === "PRICE_ID_A_CREER") {
    showToast("⚠️ Ce produit sera disponible très bientôt !");
    return;
  }
  var prod = PRODUITS.find(function(p){ return p.id === prodId; });
  var key = cartKey(prodId, format);
  var item = cart.find(function(x){ return x.key === key; });
  if (item) { item.qte++; }
  else { cart.push({ key:key, prodId:prodId, nom:prod.nom, label:f.label, priceId:priceId, prix:f.prix, qte:1 }); }
  renderCart(); updateCardState(prodId, format); showToast(prod.nom + " " + f.label + " ajouté ✓");
}

function addPackToCart(packId) {
  var pack = PACKS.find(function(p){ return p.id === packId; });
  if (pack.priceId === "PRICE_ID_A_CREER") {
    showToast("⚠️ Ce pack sera disponible très bientôt !");
    return;
  }
  var item = cart.find(function(x){ return x.key === packId; });
  if (item) { item.qte++; }
  else { cart.push({ key:packId, nom:pack.nom, label:"", priceId:pack.priceId, prix:pack.prix, qte:1 }); }
  renderCart(); updatePackState(packId); showToast(pack.nom + " ajouté ✓");
}

function removeFromCart(key) {
  cart = cart.filter(function(x){ return x.key !== key; });
  renderCart();
  var p = key.split("_");
  if (p.length === 2) updateCardState(p[0], p[1]);
  else updatePackState(key);
}

function changeQty(key, delta) {
  var item = cart.find(function(x){ return x.key === key; });
  if (!item) return;
  item.qte = Math.max(0, item.qte + delta);
  if (item.qte === 0) removeFromCart(key);
  else { renderCart(); var p = key.split("_"); if (p.length === 2) updateCardState(p[0], p[1]); else updatePackState(key); }
}

function changeQtyCard(prodId, format, delta) {
  var key = cartKey(prodId, format);
  var item = cart.find(function(x){ return x.key === key; });
  if (!item && delta > 0) { addToCart(prodId, format); return; }
  if (item) changeQty(key, delta);
}

function renderCart() {
  var empty = document.getElementById("cart-empty");
  var items = document.getElementById("cart-items");
  var totals = document.getElementById("cart-totals");
  var count = document.getElementById("cart-count");
  if (cart.length === 0) {
    empty.style.display = ""; items.style.display = "none"; totals.style.display = "none"; count.textContent = "";
    return;
  }
  empty.style.display = "none"; items.style.display = ""; totals.style.display = "";
  var total = cart.reduce(function(a, b){ return a + b.prix * b.qte; }, 0);
  count.textContent = "(" + cart.reduce(function(a, b){ return a + b.qte; }, 0) + ")";
  items.innerHTML = cart.map(function(item) {
    return "<div class='cart-item'><div style='flex:1'>"
      + "<div style='font-size:11px;font-weight:700'>" + item.nom
      + (item.label ? " <span style='color:var(--rust)'>" + item.label + "</span>" : "") + "</div>"
      + "<div style='display:flex;align-items:center;gap:6px;margin-top:4px'>"
      + "<button class='pc-btn' style='width:20px;height:20px;font-size:12px' onclick='changeQty(\"" + item.key + "\",-1)'>−</button>"
      + "<span style='font-size:11px;font-weight:700'>" + item.qte + "</span>"
      + "<button class='pc-btn' style='width:20px;height:20px;font-size:12px' onclick='changeQty(\"" + item.key + "\",1)'>+</button>"
      + "</div></div>"
      + "<div style='text-align:right'><div class='ci-price'>" + fmt(item.prix * item.qte) + "</div>"
      + "<button class='ci-rm' onclick='removeFromCart(\"" + item.key + "\")'>✕</button></div></div>";
  }).join("");
  document.getElementById("subtotal").textContent = fmt(total);
  document.getElementById("cart-total").textContent = fmt(total);
}

function updateCardState(prodId, format) {
  var key = cartKey(prodId, format);
  var item = cart.find(function(x){ return x.key === key; });
  var qte = item ? item.qte : 0;
  var card = document.getElementById("card-" + prodId + "-" + format);
  var pq = document.getElementById("pq-" + prodId + "-" + format);
  var qd = document.getElementById("qd-" + prodId + "-" + format);
  if (card) card.classList.toggle("in-cart", qte > 0);
  if (pq) { pq.textContent = qte; pq.style.display = qte > 0 ? "flex" : "none"; }
  if (qd) qd.textContent = qte;
}

function updatePackState(packId) {
  var item = cart.find(function(x){ return x.key === packId; });
  var card = document.getElementById("card-pack-" + packId);
  if (card) card.classList.toggle("in-cart", !!(item && item.qte > 0));
}

function goCheckout() {
  if (cart.length === 0) return;
  var btn = document.getElementById("checkout-btn");
  btn.disabled = true; btn.textContent = "Redirection en cours...";
  fetch("https://kookifonk-checkout.kookifonk.workers.dev", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      line_items: cart.map(function(i){ return { price: i.priceId, quantity: i.qte }; }),
      success_url: window.location.origin + "/merci.html",
      cancel_url: window.location.origin + "/panier.html"
    })
  }).then(function(r){ return r.json(); }).then(function(data) {
    if (data.url) window.location.href = data.url;
    else { alert("Erreur: " + (data.error || "inconnue")); btn.disabled = false; btn.textContent = "🔒 Payer avec Stripe"; }
  }).catch(function() {
    alert("Erreur de connexion.");
    btn.disabled = false; btn.textContent = "🔒 Payer avec Stripe";
  });
}

function renderGrid(gridId, format, prodList) {
  var list = prodList || PRODUITS;
  document.getElementById(gridId).innerHTML = list.map(function(p) {
    var unavail = FORMATS[format].priceIds[p.id] === "PRICE_ID_A_CREER";
    return "<div class='product-card" + (unavail ? "' style='opacity:.55" : "") + "' id='card-" + p.id + "-" + format + "'>"
      + "<div class='pc-emoji'>" + p.emoji + "</div>"
      + "<div class='pc-name'>" + p.nom + "</div>"
      + "<div class='pc-choco'>" + p.choco + "</div>"
      + "<div class='pc-moment'>" + p.moment + "</div>"
      + "<div class='pc-price'>" + fmt(FORMATS[format].prix) + "</div>"
      + "<div class='pc-btns'>"
      + "<button class='pc-btn' onclick='changeQtyCard(\"" + p.id + "\",\"" + format + "\",-1)'>−</button>"
      + "<span class='pc-qty-disp' id='qd-" + p.id + "-" + format + "'>0</span>"
      + "<button class='pc-btn' onclick='addToCart(\"" + p.id + "\",\"" + format + "\")'>+</button>"
      + "</div>"
      + (unavail ? "<div style='font-size:8px;color:var(--muted);margin-top:4px'>Bientôt disponible</div>" : "")
      + "<div class='pc-qty' id='pq-" + p.id + "-" + format + "'>0</div></div>";
  }).join("");
}

function renderPacks() {
  document.getElementById("grid-packs").innerHTML = PACKS.map(function(pk) {
    var unavail = pk.priceId === "PRICE_ID_A_CREER";
    var eco = pk.id === "decouverte" ? (6 * 4.90 - 27.00).toFixed(2).replace(".", ",") : null;
    return "<div class='pack-card " + pk.cardClass + "' id='card-pack-" + pk.id + "' onclick='addPackToCart(\"" + pk.id + "\")'>"
      + "<div class='pack-badge " + pk.badgeClass + "'>" + pk.badge + "</div>"
      + "<div class='pack-name'>" + pk.emoji + " " + pk.nom + "</div>"
      + "<div class='pack-desc'>" + pk.desc + "</div>"
      + "<div style='display:flex;align-items:baseline;gap:8px'>"
      + "<div class='pack-price'>" + fmt(pk.prix) + "</div>"
      + (eco ? "<span class='pack-save'>éco. " + eco + " €</span>" : "")
      + "</div>"
      + (unavail ? "<div style='font-size:8px;color:var(--muted);margin-top:6px'>Bientôt disponible</div>" : "")
      + "</div>";
  }).join("");
}

function showToast(msg) {
  var t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  setTimeout(function(){ t.classList.remove("show"); }, 2500);
}

// ── PRODUITS (sans Sensoria pour le pack 4) ──
var PRODUITS_PACK4 = PRODUITS.filter(function(p){ return p.id !== "sensoria"; });
renderGrid("grid-unite", "unite", PRODUITS);
renderGrid("grid-pack4", "pack4", PRODUITS_PACK4);
renderPacks();
</script>
</body>
</html>
